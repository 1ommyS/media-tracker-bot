services:
  postgres:
    image: postgres:16
    container_name: media-tracker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: media_tracker
      POSTGRES_USER: media_tracker
      POSTGRES_PASSWORD: media_tracker
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql

volumes:
  postgres_data: